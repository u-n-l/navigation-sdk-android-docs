site_name: Navigation SDK Documentation for Android
site_url: https://u-n-l.github.io/navigation-sdk-android-docs/
theme:
  name: material
  logo: assets/UNL logo_white.svg
  favicon: assets/Flavicon.png
  font:
    text: Poppins
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
extra_css:
  - styles/extra.css
plugins:
  - search
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
nav:
  - Home: index.md
  - Overview: 01-Overview/01-index.md
  - Get Started: 02-Get Started/01-index.md
  - Core: 03-Core/01-index.md
  - Maps: 04-Maps/01-index.md
  - Positioning & Sensors: 05-Positioning & Sensors/01-index.md
  - Search: 06-Search/01-index.md
  - Routing: 07-Routing/01-index.md
  - Navigation: 08-Navigation/01-index.md
  - Offline: 09-Offline/01-index.md
  - Alarms: 10-Alarms/01-index.md
  - Driver Behaviour: 11-Driver Behaviour.md
  - Public Transit Stops: 12-Public Transit Stops.md
  - Location Wikipedia: 13-Location Wikipedia.md
  - Weather: 14-Weather.md
  - Settings Service: 15-Settings Service.md
  - Social Reports: 16-Social Reports.md
  - Timezone Service: 17-Timezone Service.md
